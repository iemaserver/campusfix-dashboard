name: Deploy Backend to Cloud Run

on:
  workflow_run:
    workflows: ["Build and Push Backend Docker Image"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: campusfix-dashboard-9999
  REGION: us-central1
  SERVICE_NAME: campusfix-backend
  GAR_IMAGE: us-central1-docker.pkg.dev/campusfix-dashboard-9999/campusfix/campusfix-dashboard-backend:latest

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: "${{ github.token }}"
          environment: production
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_IMAGE }}
          flags: --port=8021 --allow-unauthenticated --project=${{ env.PROJECT_ID }}
          env_vars: |
            MONGO_URI=${{ secrets.MONGO_URI }}
            DB_NAME=${{ secrets.DB_NAME }}
            FLASK_DEBUG=${{ secrets.FLASK_DEBUG }}
            OUTLOOK_EMAIL=${{ secrets.OUTLOOK_EMAIL }}
            OUTLOOK_PASSWORD=${{ secrets.OUTLOOK_PASSWORD }}
            OUTLOOK_HOST=${{ secrets.OUTLOOK_HOST }}
            OUTLOOK_PORT=${{ secrets.OUTLOOK_PORT }}
            ADMIN_1_EMAIL=${{ secrets.ADMIN_1_EMAIL }}
            ADMIN_1_PASSWORD=${{ secrets.ADMIN_1_PASSWORD }}
            ADMIN_1_NAME=${{ secrets.ADMIN_1_NAME }}
            MICROSOFT_CLIENT_ID=${{ secrets.MICROSOFT_CLIENT_ID }}

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: "${{ github.token }}"
          environment-url: ${{ steps.deploy.outputs.url }}
          state: "success"
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: "${{ github.token }}"
          state: "failure"
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Show Output
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: echo "$DEPLOY_URL"
