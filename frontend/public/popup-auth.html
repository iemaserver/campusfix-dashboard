<!DOCTYPE html>
<html>
<head>
  <title>Signing in...</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      text-align: center;
    }
    .container { max-width: 280px; }
    .check { font-size: 48px; margin-bottom: 16px; }
    h2 { margin: 0 0 8px; font-weight: 600; }
    p { opacity: 0.8; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="check">✓</div>
    <h2>Sign-in complete!</h2>
    <p>Closing this window...</p>
  </div>
  <script>
    // This page only exists to receive the OAuth redirect in a popup
    // The parent window's MSAL will extract the auth code from this URL
    // Just close after a brief moment
    setTimeout(function() {
      window.close();
    }, 500);
  </script>
</body>
</html>
