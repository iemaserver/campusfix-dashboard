name: campusfix_mobile
description: "CampusFix — student mobile app for the UEM/IEM complaint management system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking (rich interceptors + multipart uploads)
  dio: ^5.7.0
  # State management
  provider: ^6.1.2
  # Local persistence for the session token, cached user, and server URL
  shared_preferences: ^2.3.2
  # Photo capture / gallery for complaint attachments
  image_picker: ^1.1.2
  # Date/time formatting (matches the web app's Asia/Kolkata display)
  intl: ^0.19.0
  # Cached, progressively-loaded network images for complaint photos
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
