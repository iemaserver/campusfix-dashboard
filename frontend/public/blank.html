<!DOCTYPE html>
<html>
  <head>
    <title>Signing in...</title>
    <style>
      body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1e3a8a; color: white; text-align: center; }
      .msg { max-width: 300px; }
      h2 { margin-bottom: 8px; }
      p { opacity: 0.8; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="msg">
      <h2>Authentication complete</h2>
      <p>This window should close automatically. If it doesn't, you can close it manually.</p>
    </div>
    <script>
      // Try to close the popup
      setTimeout(() => { window.close(); }, 500);
    </script>
  </body>
</html>
