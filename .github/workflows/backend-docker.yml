name: Build and Push Backend Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-docker.yml"
      - ".github/workflows/backend-deploy.yml"

env:
  GHCR_REGISTRY: ghcr.io
  GAR_REGISTRY: us-central1-docker.pkg.dev
  GAR_REPOSITORY: campusfix
  GCP_PROJECT_ID: hosting-vms
  GCP_REGION: us-central1
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGISTRY }} --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "$GAR_REPOSITORY" \
            --location="$GCP_REGION" \
            --project="$GCP_PROJECT_ID" 2>/dev/null \
          || gcloud artifacts repositories create "$GAR_REPOSITORY" \
            --repository-format=docker \
            --location="$GCP_REGION" \
            --project="$GCP_PROJECT_ID" \
            --description="CampusFix Docker images"
        env:
          GAR_REPOSITORY: ${{ env.GAR_REPOSITORY }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}

      - name: Lowercase IMAGE_NAME
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/campusfix-dashboard-backend
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
