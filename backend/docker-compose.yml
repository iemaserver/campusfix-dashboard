services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8021:8021"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/campusfix
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: always

volumes:
  mongodb-data:

networks:
  default:
    name: campusfix-network
